<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Valeska · Boho Chic</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #F7F1E7;
    --cream-deep: #EFE6D6;
    --ink: #33291F;
    --terracotta: #D28B5D;
    --sage: #8FAA9B;
    --lavender: #B29CC2;
    --gold: #C9A24E;
    --shadow: 0 18px 40px -18px rgba(51, 41, 31, 0.35);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(120% 90% at 50% 0%, var(--cream) 0%, var(--cream-deep) 100%);
    font-family:'Jost', sans-serif;
    color: var(--ink);
    overflow:hidden;
  }

  .stage{
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 8vh 8vw 6vh;
    position:relative;
  }

  /* textura sutil de fondo, como tela de lino */
  .stage::before{
    content:'';
    position:absolute; inset:0;
    background-image: radial-gradient(rgba(51,41,31,0.035) 1px, transparent 1px);
    background-size: 14px 14px;
    pointer-events:none;
  }

  .logo-wrap{
    position:relative;
    width:min(72vw, 300px);
    aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 2.4rem;
    animation: floatIn 1.1s cubic-bezier(.16,1,.3,1) both;
  }

  .logo-glow{
    position:absolute; inset:-14%;
    border-radius:50%;
    background: radial-gradient(circle, rgba(210,139,93,0.16) 0%, rgba(178,156,194,0.10) 45%, transparent 72%);
    filter: blur(2px);
  }

  .logo-wrap img{
    position:relative;
    width:100%; height:100%;
    object-fit:contain;
    filter: drop-shadow(0 10px 24px rgba(51,41,31,0.18));
  }

  /* firma: arco de puntada bordada, dibujado una sola vez */
  .stitch{
    width:min(60vw, 220px);
    height:34px;
    margin-bottom: 2.6rem;
    overflow:visible;
  }
  .stitch path{
    fill:none;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-dasharray: 6 9;
    stroke-dashoffset: 300;
    animation: stitchIn 1.4s 0.5s ease-out forwards;
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight:500;
    font-style:italic;
    font-size: clamp(0.95rem, 3vw, 1.05rem);
    letter-spacing:0.02em;
    color: rgba(51,41,31,0.62);
    margin: 0 0 3rem;
    text-align:center;
    animation: floatIn 1.1s 0.2s cubic-bezier(.16,1,.3,1) both;
  }

  .btn-ingreso{
    appearance:none;
    border:none;
    cursor:pointer;
    background: linear-gradient(135deg, var(--terracotta), #C77B4C);
    color: var(--cream);
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1.05rem 3.2rem;
    border-radius: 999px;
    box-shadow: var(--shadow);
    transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
    animation: floatIn 1.1s 0.35s cubic-bezier(.16,1,.3,1) both;
  }
  .btn-ingreso:hover{ transform: translateY(-2px); filter:brightness(1.04); }
  .btn-ingreso:active{ transform: translateY(0px) scale(.98); }
  .btn-ingreso:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .btn-caption{
    margin-top: 0.85rem;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(51,41,31,0.4);
    animation: floatIn 1.1s 0.45s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes floatIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes stitchIn{
    to{ stroke-dashoffset: 0; }
  }

  /* toast */
  .toast{
    position:fixed;
    left:50%; bottom: 6vh;
    transform: translate(-50%, 20px);
    background: var(--ink);
    color: var(--cream);
    font-family:'Jost', sans-serif;
    font-size: 0.85rem;
    letter-spacing:0.02em;
    padding: 0.85rem 1.4rem;
    border-radius: 12px;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition: opacity .3s ease, transform .3s ease;
    z-index: 50;
    max-width: 84vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform: translate(-50%, 0);
  }

  @media (prefers-reduced-motion: reduce){
    .logo-wrap, .tagline, .btn-ingreso, .btn-caption, .stitch path{
      animation: none !important;
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img src="assets/logo.png" alt="Valeska - Vestuario Femenino Boho Chic">
    </div>

    <svg class="stitch" viewBox="0 0 220 34" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="stitchGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#D28B5D"/>
          <stop offset="35%" stop-color="#B29CC2"/>
          <stop offset="65%" stop-color="#8FAA9B"/>
          <stop offset="100%" stop-color="#C9A24E"/>
        </linearGradient>
      </defs>
      <path d="M2,17 Q55,-6 110,17 T218,17" stroke="url(#stitchGrad)"/>
    </svg>

    <p class="tagline">Prendas con alma, hechas para volar libres</p>

    <button class="btn-ingreso" id="btnIngreso">Ingresar</button>
    <span class="btn-caption">Panel administrador</span>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(()=> t.classList.remove('show'), 2600);
    }

    document.getElementById('btnIngreso').addEventListener('click', ()=>{
      showToast('Panel de ingreso en construcción — próximo paso 🌾');
    });
  </script>
</body>
</html>
