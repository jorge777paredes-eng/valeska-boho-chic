<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Valeska · Boho Chic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FBF7F0;
    --cream-deep: #F5EEE1;
    --ink: #33291F;
    --terracotta: #D28B5D;
    --sage: #8FAA9B;
    --lavender: #B29CC2;
    --gold: #C9A24E;
    --coffee: #B79878;
    --coffee-deep: #A5835F;
    --shadow: 0 18px 40px -18px rgba(51, 41, 31, 0.35);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(120% 90% at 50% 0%, var(--cream) 0%, var(--cream-deep) 100%);
    font-family:'Jost', sans-serif;
    color: var(--ink);
    overflow:hidden;
  }

  .stage{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 8vh 8vw 6vh;
    position:relative;
  }

  /* textura sutil de fondo, como tela de lino */
  .stage::before{
    content:'';
    position:absolute; inset:0;
    background-image: radial-gradient(rgba(51,41,31,0.035) 1px, transparent 1px);
    background-size: 14px 14px;
    pointer-events:none;
  }

  .logo-wrap{
    position:relative;
    width:220px;
    height:220px;
    width:min(64vw, 260px);
    aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 2.4rem;
  }

  .logo-glow{
    position:absolute; inset:-14%;
    border-radius:50%;
    background: radial-gradient(circle, rgba(210,139,93,0.16) 0%, rgba(178,156,194,0.10) 45%, transparent 72%);
    filter: blur(2px);
  }

  .logo-circle{
    position:relative;
    width:100%; height:100%;
    border-radius:50%;
    overflow:hidden;
    box-shadow: 0 14px 32px rgba(51,41,31,0.22), 0 0 0 5px rgba(255,255,255,0.65);
    animation: emergeFromBack 1.3s cubic-bezier(.16,1,.3,1) both;
  }

  .logo-circle img{
    position:relative;
    width:100%; height:100%;
    object-fit:cover;
  }

  /* firma: arco de puntada bordada, dibujado una sola vez */
  .stitch{
    width:200px;
    width:min(60vw, 220px);
    height:34px;
    margin-bottom: 2.6rem;
    overflow:visible;
  }
  .stitch path{
    fill:none;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-dasharray: 6 9;
    stroke-dashoffset: 300;
    animation: stitchIn 1.4s 0.5s ease-out forwards;
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight:500;
    font-style:italic;
    font-size: 1rem;
    font-size: clamp(0.95rem, 3vw, 1.05rem);
    letter-spacing:0.02em;
    color: rgba(51,41,31,0.62);
    margin: 0 0 3rem;
    text-align:center;
    animation: floatIn 1.1s 0.2s cubic-bezier(.16,1,.3,1) both;
  }

  .btn-ingreso{
    appearance:none;
    border:none;
    cursor:pointer;
    background: linear-gradient(135deg, var(--terracotta), #C77B4C);
    color: var(--cream);
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1.05rem 3.2rem;
    border-radius: 999px;
    box-shadow: var(--shadow);
    transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
    animation: floatIn 1.1s 0.35s cubic-bezier(.16,1,.3,1) both;
  }
  .btn-ingreso:hover{ transform: translateY(-2px); filter:brightness(1.04); }
  .btn-ingreso:active{ transform: translateY(0px) scale(.98); }
  .btn-ingreso:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .btn-caption{
    margin-top: 0.85rem;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(51,41,31,0.4);
    animation: floatIn 1.1s 0.45s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes floatIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes emergeFromBack{
    0%{ opacity:0; transform: scale(0.5); filter: blur(7px); }
    55%{ opacity:1; filter: blur(0px); }
    100%{ opacity:1; transform: scale(1); }
  }
  @keyframes stitchIn{
    to{ stroke-dashoffset: 0; }
  }

  /* toast */
  .toast{
    position:fixed;
    left:50%; bottom: 6vh;
    transform: translate(-50%, 20px);
    background: var(--ink);
    color: var(--cream);
    font-family:'Jost', sans-serif;
    font-size: 0.85rem;
    letter-spacing:0.02em;
    padding: 0.85rem 1.4rem;
    border-radius: 12px;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition: opacity .3s ease, transform .3s ease;
    z-index: 50;
    max-width: 84vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform: translate(-50%, 0);
  }

  @media (prefers-reduced-motion: reduce){
    .logo-wrap, .tagline, .btn-ingreso, .btn-caption, .stitch path{
      animation: none !important;
    }
  }

  /* modal de ingreso */
  .modal-backdrop{
    position:fixed; inset:0;
    background: rgba(51,41,31,0.45);
    backdrop-filter: blur(2px);
    display:flex; align-items:center; justify-content:center;
    padding: 6vw;
    opacity:0; pointer-events:none;
    transition: opacity .25s ease;
    z-index: 40;
  }
  .modal-backdrop.show{
    opacity:1; pointer-events:auto;
  }

  .modal-card{
    background: var(--cream);
    border-radius: 22px;
    padding: 2.2rem 2rem 1.8rem;
    width: min(90vw, 340px);
    box-shadow: 0 24px 60px -18px rgba(51,41,31,0.5);
    transform: translateY(10px) scale(.97);
    transition: transform .25s ease;
    position: relative;
  }
  .modal-backdrop.show .modal-card{
    transform: translateY(0) scale(1);
  }

  .modal-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 1.25rem;
    color: var(--ink);
    text-align:center;
    margin: 0 0 0.35rem;
  }
  .modal-sub{
    font-family:'Jost', sans-serif;
    font-size: 0.78rem;
    letter-spacing:0.08em;
    text-transform: uppercase;
    color: rgba(51,41,31,0.45);
    text-align:center;
    margin: 0 0 1.5rem;
  }

  .field{
    margin-bottom: 1.1rem;
  }
  .field label{
    display:block;
    font-size: 0.72rem;
    letter-spacing:0.1em;
    text-transform: uppercase;
    color: rgba(51,41,31,0.55);
    margin-bottom: 0.4rem;
  }
  .field input, .field select{
    width:100%;
    font-family:'Jost', sans-serif;
    font-size: 1rem;
    padding: 0.75rem 0.9rem;
    border: 1.5px solid rgba(51,41,31,0.18);
    border-radius: 12px;
    background: #fff;
    color: var(--ink);
    box-sizing: border-box;
    transition: border-color .2s ease;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2333291F' stroke-width='2' stroke-linecap='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0.85rem center;
    background-size: 16px;
    padding-right: 2.4rem;
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color: var(--terracotta);
  }
  .field input:focus-visible, .field select:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .modal-actions{
    display:flex;
    gap: 0.6rem;
    margin-top: 0.4rem;
  }
  .modal-actions button{
    flex:1;
    border:none;
    border-radius: 999px;
    padding: 0.75rem 1rem;
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 0.85rem;
    letter-spacing:0.04em;
    cursor:pointer;
    transition: transform .2s ease, filter .2s ease;
  }
  .modal-actions button:hover{ transform: translateY(-1px); }

  .btn-submit{
    background: linear-gradient(135deg, var(--terracotta), #C77B4C);
    color: var(--cream);
  }
  .btn-cancel{
    background: transparent;
    color: rgba(51,41,31,0.55);
    border: 1.5px solid rgba(51,41,31,0.18) !important;
  }

  .modal-close{
    position:absolute;
    top: 0.9rem; right: 1.1rem;
    background:none; border:none;
    font-size: 1.1rem;
    color: rgba(51,41,31,0.4);
    cursor:pointer;
    line-height:1;
  }

  @media (prefers-reduced-motion: reduce){
    .modal-backdrop, .modal-card{ transition:none !important; }
  }

  /* fecha bajo el botón de ingreso */
  .date-display{
    margin-top: 0.7rem;
    font-family:'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(51,41,31,0.35);
    text-align:center;
    animation: floatIn 1.1s 0.55s cubic-bezier(.16,1,.3,1) both;
  }

  /* pantalla de bienvenida / home */
  .home-screen{
    position:fixed; inset:0;
    min-height:100vh;
    min-height:100dvh;
    background: radial-gradient(120% 90% at 50% 0%, var(--cream) 0%, var(--cream-deep) 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 8vh 8vw;
    opacity:0;
    pointer-events:none;
    transition: opacity .35s ease;
    z-index: 30;
  }
  .home-screen.show{
    opacity:1;
    pointer-events:auto;
  }

  .home-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-optical-sizing:auto;
    font-size: clamp(1.35rem, 6vw, 1.75rem);
    text-align:center;
    color: var(--ink);
    margin: 0 0 2.6rem;
    line-height:1.35;
  }

  .home-actions{
    display:flex;
    flex-direction:column;
    gap: 1rem;
    width:100%;
    max-width: 320px;
  }

  .btn-coffee{
    appearance:none;
    border:none;
    cursor:pointer;
    background: linear-gradient(135deg, var(--coffee), var(--coffee-deep));
    color: var(--cream);
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 0.98rem;
    letter-spacing: 0.03em;
    padding: 1.05rem 1.4rem;
    border-radius: 999px;
    box-shadow: 0 14px 30px -14px rgba(51,41,31,0.35);
    transition: transform .2s ease, filter .2s ease;
  }
  .btn-coffee:hover{ transform: translateY(-2px); filter:brightness(1.05); }
  .btn-coffee:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce){
    .home-screen{ transition:none !important; }
  }

  /* pantalla: ingresar prenda */
  .form-screen{
    position:fixed; inset:0;
    background: radial-gradient(120% 90% at 50% 0%, var(--cream) 0%, var(--cream-deep) 100%);
    opacity:0;
    pointer-events:none;
    transition: opacity .3s ease;
    overflow-y: auto;
    z-index: 25;
  }
  .form-screen.show{
    opacity:1;
    pointer-events:auto;
  }

  .form-wrap{
    max-width: 420px;
    margin: 0 auto;
    padding: 7vh 7vw 5vh;
  }

  .form-back{
    background:none;
    border:none;
    cursor:pointer;
    font-family:'Jost', sans-serif;
    font-size: 0.85rem;
    letter-spacing:0.04em;
    color: rgba(51,41,31,0.55);
    display:flex;
    align-items:center;
    gap: 0.4rem;
    margin-bottom: 1.6rem;
    padding: 0.3rem 0;
  }
  .form-back:hover{ color: var(--ink); }

  .form-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 1.5rem;
    color: var(--ink);
    margin: 0 0 1.8rem;
  }

  .photo-row{
    display:flex;
    gap: 0.7rem;
    margin: 0 0 1.5rem;
  }
  .photo-slot{
    flex:1;
    aspect-ratio: 1/1;
    min-width:0;
    border-radius: 16px;
    border: 2px dashed rgba(51,41,31,0.28);
    background: rgba(255,255,255,0.5);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 0.25rem;
    cursor:pointer;
    overflow:hidden;
    position:relative;
    transition: border-color .2s ease, background .2s ease;
  }
  .photo-slot:hover{
    border-color: var(--terracotta);
  }
  .photo-slot.has-image{
    border-style: solid;
    border-color: rgba(51,41,31,0.12);
  }
  .photo-slot img{
    width:100%; height:100%;
    object-fit:cover;
  }
  .photo-slot .photo-icon{
    font-size: 1.3rem;
    opacity:0.55;
  }
  .photo-slot .photo-label{
    font-family:'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color: rgba(51,41,31,0.5);
    text-align:center;
  }
  .photo-slot .photo-edit{
    position:absolute;
    bottom: 0.3rem; right: 0.3rem;
    background: rgba(51,41,31,0.65);
    color:#fff;
    font-size: 0.58rem;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding: 0.22rem 0.45rem;
    border-radius: 999px;
  }
  .photo-slot .photo-remove{
    position:absolute;
    top: 0.3rem; right: 0.3rem;
    width: 20px; height: 20px;
    background: rgba(51,41,31,0.7);
    color:#fff;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 0.75rem;
    line-height:1;
  }

  .field-row{
    display:flex;
    gap: 0.8rem;
  }
  .field-row .field{
    flex:1;
    min-width:0;
  }

  .form-actions{
    display:flex;
    gap: 0.7rem;
    margin-top: 0.6rem;
  }
  .form-actions button{
    flex:1;
    border:none;
    border-radius: 999px;
    padding: 0.9rem 1rem;
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 0.92rem;
    letter-spacing:0.03em;
    cursor:pointer;
    transition: transform .2s ease, filter .2s ease;
  }
  .form-actions button:hover{ transform: translateY(-1px); }
  .form-btn-cancel{
    background: transparent;
    color: rgba(51,41,31,0.55);
    border: 1.5px solid rgba(51,41,31,0.18) !important;
  }
  .form-btn-save{
    background: linear-gradient(135deg, var(--terracotta), #C77B4C);
    color: var(--cream);
  }

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

      mostrarPantalla(formPrendaScreen);
    });
    document.getElementById('btnRegistrarVenta').addEventListener('click', ()=>{
      showToast('Registrar venta — próximo paso 🌿');
    });
    document.getElementById('btnGaleria').addEventListener('click', ()=>{
      showToast('Galería — próximo paso 🖼️');
    });

    document.getElementById('btnVolverHome').addEventListener('click', ()=>{
      mostrarPantalla(homeScreen);
    });
    document.getElementById('btnCancelarPrenda').addEventListener('click', ()=>{
      mostrarPantalla(homeScreen);
    });

    // --- Fotos de la prenda (hasta 3) ---
    const inputFoto = document.getElementById('inputFoto');
    const photoSlots = document.querySelectorAll('.photo-slot');
    const fotosPrenda = [null, null, null]; // cada una: { file, preview } o null
    let slotActivo = null;

    function renderSlot(slot, index){
      if(fotosPrenda[index]){
        slot.classList.add('has-image');
        slot.innerHTML = `
          <img src="${fotosPrenda[index].preview}" alt="Foto ${index + 1} de la prenda">
          <span class="photo-remove" data-remove="${index}">✕</span>
        `;
      } else {
        slot.classList.remove('has-image');
        slot.innerHTML = `
          <span class="photo-icon">📷</span>
          <span class="photo-label">Foto ${index + 1}</span>
        `;
      }
    }

    photoSlots.forEach((slot)=>{
      slot.addEventListener('click', (e)=>{
        const index = Number(slot.dataset.index);
        // si se tocó la "x" de eliminar, no abrir el selector de archivos
        if(e.target.closest('.photo-remove')){
          fotosPrenda[index] = null;
          renderSlot(slot, index);
          return;
        }
        slotActivo = index;
        inputFoto.click();
      });
    });

    inputFoto.addEventListener('change', ()=>{
      const archivo = inputFoto.files && inputFoto.files[0];
      if(!archivo || slotActivo === null) return;
      const index = slotActivo;
      const lector = new FileReader();
      lector.onload = (e)=>{
        fotosPrenda[index] = { file: archivo, preview: e.target.result };
        renderSlot(photoSlots[index], index);
      };
      lector.readAsDataURL(archivo);
      inputFoto.value = '';
    });

    function resetFormPrenda(){
      document.getElementById('formPrenda').reset();
      document.getElementById('inputFecha').value = fechaHoyISO();
      for(let i=0; i<3; i++){
        fotosPrenda[i] = null;
        renderSlot(photoSlots[i], i);
      }
    }

    async function subirFoto(fotoObj, prefijo){
      if(!fotoObj) return null;
      const extension = (fotoObj.file.name.split('.').pop() || 'jpg').toLowerCase();
      const ruta = `${prefijo}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${extension}`;

      const { error } = await sb.storage
        .from('fotos-prendas')
        .upload(ruta, fotoObj.file, { upsert: false });

      if(error) throw error;

      const { data } = sb.storage.from('fotos-prendas').getPublicUrl(ruta);
      return data.publicUrl;
    }

    document.getElementById('formPrenda').addEventListener('submit', async (e)=>{
      e.preventDefault();

      if(!usuarioActual){
        showToast('Tu sesión expiró, ingresa de nuevo');
        return;
      }

      const saveBtn = document.querySelector('#formPrenda .form-btn-save');
      const textoOriginal = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';

      try{
        const slugBase = (document.getElementById('inputNombrePrenda').value || 'prenda')
          .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

        const [foto1_url, foto2_url, foto3_url] = await Promise.all([
          subirFoto(fotosPrenda[0], slugBase || 'prenda-1'),
          subirFoto(fotosPrenda[1], slugBase || 'prenda-2'),
          subirFoto(fotosPrenda[2], slugBase || 'prenda-3'),
        ]);

        const { error } = await sb.from('prendas').insert({
          nombre: document.getElementById('inputNombrePrenda').value,
          categoria: document.getElementById('inputCategoria').value,
          talla: document.getElementById('inputTalla').value,
          precio: Number(document.getElementById('inputPrecio').value),
          fecha_ingreso: document.getElementById('inputFecha').value,
          foto1_url, foto2_url, foto3_url,
          ingresado_por_uid: usuarioActual.uid,
          ingresado_por_nombre: usuarioActual.nombre,
        });

        if(error) throw error;

        showToast('Prenda guardada 🌾');
        resetFormPrenda();
        mostrarPantalla(homeScreen);

      } catch(err){
        console.error(err);
        showToast('No se pudo guardar la prenda. Intenta de nuevo.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = textoOriginal;
      }
    });

    function mostrarHome(nombre){
      const saludo = nombre === 'Valeska' ? 'Bienvenida' : 'Bienvenido';
      homeTitle.textContent = `${saludo}, ${nombre} 🌾 ¿Qué deseamos hacer hoy?`;
      document.querySelector('.stage').style.display = 'none';
      mostrarPantalla(homeScreen);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const rutLimpio = limpiarRut(inputRut.value);
      const pass = inputPass.value;
      const perfil = PERFILES[rutLimpio];

      if(!perfil){
        showToast('RUT o clave incorrectos');
        return;
      }

      const email = `${rutLimpio}@${DOMINIO_AUTH}`;
      const submitBtn = document.querySelector('#loginForm button[type="submit"]');
      submitBtn.disabled = true;

      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

      submitBtn.disabled = false;

      if(error || !data.user){
        showToast('RUT o clave incorrectos');
        return;
      }

      usuarioActual = { uid: data.user.id, nombre: perfil.nombre, rol: perfil.rol };
      cerrarModal();
      mostrarHome(usuarioActual.nombre);
    });

    // --- Fecha actualizada ---
    function fechaHoyISO(){
      const hoy = new Date();
      const y = hoy.getFullYear();
      const m = String(hoy.getMonth() + 1).padStart(2, '0');
      const d = String(hoy.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    (function inicializarFechas(){
      const elTexto = document.getElementById('fechaHoy');
      if(elTexto){
        let txt = new Date().toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        txt = txt.charAt(0).toUpperCase() + txt.slice(1);
        elTexto.textContent = txt;
      }
      const elFecha = document.getElementById('inputFecha');
      if(elFecha) elFecha.value = fechaHoyISO();
    })();
  </script>
</body>
</html>
